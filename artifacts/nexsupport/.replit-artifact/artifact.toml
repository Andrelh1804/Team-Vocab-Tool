kind = "web"
previewPath = "/"
title = "NexSupport AI"
version = "1.0.0"
id = "artifacts/nexsupport"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22625

[services.development]
run = "pnpm --filter @workspace/nexsupport run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexsupport", "run", "build" ]
serve = "static"
publicDir = "artifacts/nexsupport/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22625"
BASE_PATH = "/"
