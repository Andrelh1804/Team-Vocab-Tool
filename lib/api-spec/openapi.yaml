openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NexSupport AI - Enterprise IT Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard statistics and summaries
  - name: devices
    description: Device and asset inventory management
  - name: tickets
    description: Help desk ticket management
  - name: alerts
    description: Monitoring alerts
  - name: ai
    description: AI assistant and diagnostics
  - name: automations
    description: Automation workflows
  - name: users
    description: User management
  - name: activity
    description: Activity feed
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ───────────────────────────────────────────────
  /dashboard/executive:
    get:
      operationId: getExecutiveDashboard
      tags: [dashboard]
      summary: Executive dashboard summary
      responses:
        "200":
          description: Executive dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveDashboard"

  /dashboard/technical:
    get:
      operationId: getTechnicalDashboard
      tags: [dashboard]
      summary: Technical dashboard summary
      responses:
        "200":
          description: Technical dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicalDashboard"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  # ─── DEVICES ─────────────────────────────────────────────────
  /devices:
    get:
      operationId: listDevices
      tags: [devices]
      summary: List all devices
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [online, offline, warning, unknown]
        - name: type
          in: query
          schema:
            type: string
            enum: [notebook, desktop, server, printer, switch, firewall, router, ap, nas, iot, other]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
    post:
      operationId: createDevice
      tags: [devices]
      summary: Register a new device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceInput"
      responses:
        "201":
          description: Device created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"

  /devices/{id}:
    get:
      operationId: getDevice
      tags: [devices]
      summary: Get device details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          description: Not found
    patch:
      operationId: updateDevice
      tags: [devices]
      summary: Update a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpdate"
      responses:
        "200":
          description: Device updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
    delete:
      operationId: deleteDevice
      tags: [devices]
      summary: Remove a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /devices/stats:
    get:
      operationId: getDeviceStats
      tags: [devices]
      summary: Device count statistics by type and status
      responses:
        "200":
          description: Device stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStats"

  /devices/{id}/metrics:
    get:
      operationId: getDeviceMetrics
      tags: [devices]
      summary: Performance metrics for a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceMetrics"

  # ─── TICKETS ─────────────────────────────────────────────────
  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, pending, resolved, closed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
        - name: assigneeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Not found
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/stats:
    get:
      operationId: getTicketStats
      tags: [tickets]
      summary: Ticket counts and SLA stats
      responses:
        "200":
          description: Ticket stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketStats"

  /tickets/{id}/comments:
    get:
      operationId: listTicketComments
      tags: [tickets]
      summary: List comments for a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketComment"
    post:
      operationId: addTicketComment
      tags: [tickets]
      summary: Add a comment to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketCommentInput"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketComment"

  # ─── ALERTS ──────────────────────────────────────────────────
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List monitoring alerts
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, info]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, acknowledged, resolved]
        - name: deviceId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create a manual alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}/resolve:
    post:
      operationId: resolveAlert
      tags: [alerts]
      summary: Resolve an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/summary:
    get:
      operationId: getAlertSummary
      tags: [alerts]
      summary: Active alerts grouped by severity
      responses:
        "200":
          description: Alert summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSummary"

  # ─── AI ──────────────────────────────────────────────────────
  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiReply"

  /ai/diagnose/{deviceId}:
    post:
      operationId: diagnoseDevice
      tags: [ai]
      summary: AI-powered device diagnosis
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Diagnosis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosisResult"

  /ai/scripts:
    get:
      operationId: listScripts
      tags: [ai]
      summary: List script library items
      parameters:
        - name: language
          in: query
          schema:
            type: string
            enum: [powershell, bash, python, cmd]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Script list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"
    post:
      operationId: createScript
      tags: [ai]
      summary: Create a script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScriptInput"
      responses:
        "201":
          description: Script created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"

  # ─── AUTOMATIONS ─────────────────────────────────────────────
  /automations:
    get:
      operationId: listAutomations
      tags: [automations]
      summary: List automation workflows
      responses:
        "200":
          description: Automation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Automation"
    post:
      operationId: createAutomation
      tags: [automations]
      summary: Create an automation workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationInput"
      responses:
        "201":
          description: Automation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"

  /automations/{id}:
    get:
      operationId: getAutomation
      tags: [automations]
      summary: Get automation details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Automation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
    patch:
      operationId: updateAutomation
      tags: [automations]
      summary: Update automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
    delete:
      operationId: deleteAutomation
      tags: [automations]
      summary: Delete automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /automations/{id}/toggle:
    post:
      operationId: toggleAutomation
      tags: [automations]
      summary: Enable or disable automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"

  # ─── USERS ───────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List platform users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

# ─── SCHEMAS ────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Dashboard ──
    ExecutiveDashboard:
      type: object
      required:
        - totalDevices
        - onlineDevices
        - offlineDevices
        - openTickets
        - resolvedThisWeek
        - criticalAlerts
        - uptimePercent
        - slaCompliancePercent
        - devicesByType
        - ticketsByPriority
        - weeklyTicketTrend
      properties:
        totalDevices:
          type: integer
        onlineDevices:
          type: integer
        offlineDevices:
          type: integer
        openTickets:
          type: integer
        resolvedThisWeek:
          type: integer
        criticalAlerts:
          type: integer
        uptimePercent:
          type: number
        slaCompliancePercent:
          type: number
        devicesByType:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        ticketsByPriority:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        weeklyTicketTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"

    TechnicalDashboard:
      type: object
      required:
        - devicesByStatus
        - alertsBySeverity
        - topIssues
        - avgResponseTimeMs
        - avgResolutionTimeHours
        - scriptsRun
        - automationsTriggered
        - cpuTrend
        - memoryTrend
      properties:
        devicesByStatus:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        alertsBySeverity:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        topIssues:
          type: array
          items:
            $ref: "#/components/schemas/TopIssue"
        avgResponseTimeMs:
          type: number
        avgResolutionTimeHours:
          type: number
        scriptsRun:
          type: integer
        automationsTriggered:
          type: integer
        cpuTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"
        memoryTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"

    ChartDataPoint:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: integer
        color:
          type: ["string", "null"]

    TrendDataPoint:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: number

    TopIssue:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    ActivityEvent:
      type: object
      required: [id, type, message, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [device_added, device_offline, ticket_created, ticket_resolved, alert_triggered, automation_run, ai_diagnosis]
        message:
          type: string
        entityId:
          type: ["integer", "null"]
        entityName:
          type: ["string", "null"]
        severity:
          type: ["string", "null"]
        timestamp:
          type: string
          format: date-time

    # ── Devices ──
    Device:
      type: object
      required: [id, name, type, status, ipAddress, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        hostname:
          type: ["string", "null"]
        type:
          type: string
          enum: [notebook, desktop, server, printer, switch, firewall, router, ap, nas, iot, other]
        status:
          type: string
          enum: [online, offline, warning, unknown]
        ipAddress:
          type: string
        macAddress:
          type: ["string", "null"]
        operatingSystem:
          type: ["string", "null"]
        manufacturer:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        serialNumber:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        assignedUser:
          type: ["string", "null"]
        cpuUsage:
          type: ["number", "null"]
        memoryUsage:
          type: ["number", "null"]
        diskUsage:
          type: ["number", "null"]
        lastSeen:
          type: ["string", "null"]
          format: date-time
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    DeviceInput:
      type: object
      required: [name, type, ipAddress]
      properties:
        name:
          type: string
        hostname:
          type: string
        type:
          type: string
          enum: [notebook, desktop, server, printer, switch, firewall, router, ap, nas, iot, other]
        ipAddress:
          type: string
        macAddress:
          type: string
        operatingSystem:
          type: string
        manufacturer:
          type: string
        model:
          type: string
        serialNumber:
          type: string
        location:
          type: string
        assignedUser:
          type: string
        tags:
          type: array
          items:
            type: string

    DeviceUpdate:
      type: object
      properties:
        name:
          type: string
        hostname:
          type: string
        status:
          type: string
          enum: [online, offline, warning, unknown]
        ipAddress:
          type: string
        location:
          type: string
        assignedUser:
          type: string
        tags:
          type: array
          items:
            type: string

    DeviceStats:
      type: object
      required: [byStatus, byType, total]
      properties:
        total:
          type: integer
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        byType:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"

    DeviceMetrics:
      type: object
      required: [deviceId, cpuHistory, memoryHistory, diskHistory]
      properties:
        deviceId:
          type: integer
        cpuHistory:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"
        memoryHistory:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"
        diskHistory:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"

    # ── Tickets ──
    Ticket:
      type: object
      required: [id, title, status, priority, category, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, in_progress, pending, resolved, closed]
        priority:
          type: string
          enum: [critical, high, medium, low]
        category:
          type: string
        assigneeId:
          type: ["integer", "null"]
        assigneeName:
          type: ["string", "null"]
        reporterName:
          type: ["string", "null"]
        deviceId:
          type: ["integer", "null"]
        deviceName:
          type: ["string", "null"]
        slaDeadline:
          type: ["string", "null"]
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    TicketInput:
      type: object
      required: [title, priority, category]
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [critical, high, medium, low]
        category:
          type: string
        assigneeId:
          type: ["integer", "null"]
        reporterName:
          type: string
        deviceId:
          type: ["integer", "null"]

    TicketUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in_progress, pending, resolved, closed]
        priority:
          type: string
          enum: [critical, high, medium, low]
        category:
          type: string
        assigneeId:
          type: ["integer", "null"]

    TicketStats:
      type: object
      required: [open, inProgress, pending, resolved, closed, slaBreached, avgResolutionHours]
      properties:
        open:
          type: integer
        inProgress:
          type: integer
        pending:
          type: integer
        resolved:
          type: integer
        closed:
          type: integer
        slaBreached:
          type: integer
        avgResolutionHours:
          type: number
        byPriority:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"

    TicketComment:
      type: object
      required: [id, ticketId, content, authorName, createdAt]
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        content:
          type: string
        authorName:
          type: string
        isInternal:
          type: boolean
        createdAt:
          type: string
          format: date-time

    TicketCommentInput:
      type: object
      required: [content, authorName]
      properties:
        content:
          type: string
        authorName:
          type: string
        isInternal:
          type: boolean

    # ── Alerts ──
    Alert:
      type: object
      required: [id, title, severity, status, source, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: ["string", "null"]
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        status:
          type: string
          enum: [active, acknowledged, resolved]
        source:
          type: string
        deviceId:
          type: ["integer", "null"]
        deviceName:
          type: ["string", "null"]
        acknowledgedAt:
          type: ["string", "null"]
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    AlertInput:
      type: object
      required: [title, severity, source]
      properties:
        title:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        source:
          type: string
        deviceId:
          type: ["integer", "null"]

    AlertSummary:
      type: object
      required: [total, active, critical, high, medium, low]
      properties:
        total:
          type: integer
        active:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer

    # ── AI ──
    AiChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        context:
          type: ["string", "null"]
        deviceId:
          type: ["integer", "null"]

    AiReply:
      type: object
      required: [response, sessionId]
      properties:
        response:
          type: string
        sessionId:
          type: string
        suggestions:
          type: array
          items:
            type: string
        scripts:
          type: array
          items:
            $ref: "#/components/schemas/Script"

    DiagnosisResult:
      type: object
      required: [deviceId, summary, issues, recommendations]
      properties:
        deviceId:
          type: integer
        summary:
          type: string
        issues:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosisIssue"
        recommendations:
          type: array
          items:
            type: string
        criticality:
          type: string
          enum: [critical, high, medium, low, healthy]
        scripts:
          type: array
          items:
            $ref: "#/components/schemas/Script"

    DiagnosisIssue:
      type: object
      required: [title, description, severity]
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low]
        category:
          type: string

    Script:
      type: object
      required: [id, title, language, content, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        language:
          type: string
          enum: [powershell, bash, python, cmd]
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        isAiGenerated:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ScriptInput:
      type: object
      required: [title, language, content]
      properties:
        title:
          type: string
        description:
          type: string
        language:
          type: string
          enum: [powershell, bash, python, cmd]
        content:
          type: string
        tags:
          type: array
          items:
            type: string

    # ── Automations ──
    Automation:
      type: object
      required: [id, name, trigger, isActive, runCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        trigger:
          type: string
          enum: [alert, schedule, device_offline, ticket_created, manual]
        isActive:
          type: boolean
        runCount:
          type: integer
        lastRunAt:
          type: ["string", "null"]
          format: date-time
        actions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    AutomationInput:
      type: object
      required: [name, trigger]
      properties:
        name:
          type: string
        description:
          type: string
        trigger:
          type: string
          enum: [alert, schedule, device_offline, ticket_created, manual]
        actions:
          type: array
          items:
            type: string

    AutomationUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        trigger:
          type: string
          enum: [alert, schedule, device_offline, ticket_created, manual]
        isActive:
          type: boolean
        actions:
          type: array
          items:
            type: string

    # ── Users ──
    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, technician, viewer]
        isActive:
          type: boolean
        avatar:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
